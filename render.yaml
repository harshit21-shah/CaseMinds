services:
  - type: web
    name: caseminds
    runtime: python
    region: oregon
    plan: free
    buildCommand: bash scripts/build_render.sh
    startCommand: bash -c 'uvicorn services.api.main:app --host 0.0.0.0 --port $PORT'
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: NODE_VERSION
        value: "22.12.0"
      - key: HF_HOME
        value: ./data/hf_cache
      - key: TRANSFORMERS_CACHE
        value: ./data/hf_cache
      - key: SENTENCE_TRANSFORMERS_HOME
        value: ./data/hf_cache
      - key: GROQ_API_KEY
        sync: false
      - key: INDIAN_KANOON_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SEED_ADMIN_SECRET
        sync: false
      # Free tier has no persistent disk — paths use ephemeral ./data/ (re-seed after redeploy)
      - key: DATABASE_URL
        value: sqlite:///./data/caseminds.db
      - key: CHROMA_PERSIST_DIR
        value: ./data/chroma
      - key: GRAPH_PATH
        value: ./data/graph.pkl
      - key: BM25_PATH
        value: ./data/bm25.pkl
      - key: FRONTEND_DIST
        value: ./frontend/dist
      - key: MIN_RETRIEVAL_SCORE
        value: "0.30"
      - key: VERIFICATION_THRESHOLD
        value: "0.50"
      - key: VERIFICATION_MIN_VERIFIED
        value: "1"
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO

    # Persistent disk requires Starter ($7/mo) or higher — not available on free tier.
    # See render.starter.yaml or DEPLOYMENT.md to enable disk on paid plans.
