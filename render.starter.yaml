# Render Blueprint — Starter plan ($7/mo) with persistent disk.
# Use this if you want the corpus to survive redeploys without re-seeding.
#
# Deploy: Render dashboard → New Blueprint → point at this file instead of render.yaml
# Or change plan: starter in services[0] below.

services:
  - type: web
    name: caseminds
    runtime: python
    region: oregon
    plan: starter
    buildCommand: bash scripts/build_render.sh
    startCommand: bash -c 'uvicorn services.api.main:app --host 0.0.0.0 --port $PORT'
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: NODE_VERSION
        value: "22.12.0"
      - key: GROQ_API_KEY
        sync: false
      - key: INDIAN_KANOON_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:////app/data/caseminds.db
      - key: CHROMA_PERSIST_DIR
        value: /app/data/chroma
      - key: GRAPH_PATH
        value: /app/data/graph.pkl
      - key: BM25_PATH
        value: /app/data/bm25.pkl
      - key: FRONTEND_DIST
        value: ./frontend/dist
      - key: VERIFICATION_THRESHOLD
        value: "0.50"
      - key: VERIFICATION_MIN_VERIFIED
        value: "1"
      - key: ENVIRONMENT
        value: production
    disk:
      name: caseminds-data
      mountPath: /app/data
      sizeGB: 1
